name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: bash -n (syntax)
        run: |
          set -e
          for f in install.sh hypr/scripts/configure hypr/scripts/location-switch \
                   hypr/scripts/monitor-listener hypr/scripts/99-hypr-location \
                   hypr/config/layouts.sh tests/wizard_test.sh; do
            bash -n "$f"
            echo "ok $f"
          done

      - name: shellcheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          severity: style
          scandir: "."
          ignore_paths: >-
            .github
            .backups

      - name: shfmt (2-space indent, check mode)
        uses: luizm/action-sh-checker@v0.9.0
        env:
          SHFMT_OPTS: "-i 2 -ci -sr -d"
        with:
          sh_checker_shellcheck_disable: "true"
          sh_checker_checkbashisms_enable: "false"
          sh_checker_comment: "false"

      - name: actionlint
        uses: raven-actions/actionlint@v2

  test:
    name: tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends jq bsdmainutils util-linux

      - name: Run wizard integration tests
        run: ./tests/wizard_test.sh

  security:
    name: security
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scanners: "vuln,secret,misconfig"
          severity: "HIGH,CRITICAL"
          exit-code: "1"
          ignore-unfixed: "true"

      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
