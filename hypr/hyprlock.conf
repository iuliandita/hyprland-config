# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┃                    Hyprlock Configuration                   ┃
# ┃                     Tokyo Night theme                       ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

# Tokyo Night palette
$tn_bg = rgb(1a1b26)
$tn_bg_dark = rgb(16161e)
$tn_bg_storm = rgb(24283b)
$tn_fg = rgb(c0caf5)
$tn_fg_dim = rgb(565f89)
$tn_blue = rgb(7aa2f7)
$tn_cyan = rgb(7dcfff)
$tn_green = rgb(9ece6a)
$tn_red = rgb(f7768e)
$tn_magenta = rgb(bb9af7)
$tn_yellow = rgb(e0af68)
$tn_selection = rgb(283457)
$tn_terminal_black = rgb(414868)

$font = Open Sans

general {
    hide_cursor = true
    grace = 3
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 3, linear
    animation = inputFieldDots, 1, 2, linear
}

# ======= Background =======
# Blurred screenshot, matching the old swaylock-fancy look

background {
    monitor =
    path = screenshot
    blur_passes = 4
    blur_size = 6
    brightness = 0.7
    vibrancy = 0.2
    vibrancy_darkness = 0.2
}

# ======= Password Input =======

input-field {
    monitor =
    size = 320, 55
    outline_thickness = 3
    inner_color = rgba(22, 22, 30, 0.85)
    outer_color = $tn_blue
    check_color = $tn_green
    fail_color = $tn_red
    font_color = $tn_fg
    fade_on_empty = false
    rounding = 15
    font_family = $font
    placeholder_text = <i>Password...</i>
    fail_text = <i>$PAMFAIL</i>
    dots_spacing = 0.3
    dots_size = 0.33
    position = 0, -80
    halign = center
    valign = center
}

# ======= Clock =======

label {
    monitor =
    text = $TIME12
    font_size = 96
    font_family = $font
    color = $tn_fg
    shadow_passes = 2
    shadow_size = 3
    shadow_boost = 0.5
    position = 0, 200
    halign = center
    valign = center
}

# ======= Date =======

label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B"
    font_size = 24
    font_family = $font
    color = $tn_cyan
    position = 0, 120
    halign = center
    valign = center
}

# ======= Greeting =======

label {
    monitor =
    text = Hi, $USER
    font_size = 18
    font_family = $font
    color = $tn_fg_dim
    position = 0, -20
    halign = center
    valign = center
}
