# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┃                    Windowrules Configuration                ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

# Windows Rules https://wiki.hypr.land/Configuring/Window-Rules/

# Float by title (any class)
windowrule {
  name = float-by-title
  float = on
  match:title = ^(Picture in picture|Save File|Open File|Steam - Self Updater|SteamTinker.*)$
}

# Float specific applications
windowrule {
  name = float-system-apps
  float = on
  match:class = ^(org.pulseaudio.pavucontrol|blueman-manager|CachyOSHello|zenity)$
}

windowrule {
  name = float-xdg-portals
  float = on
  match:class = ^(xdg-desktop-portal-gtk|xdg-desktop-portal-kde|xdg-desktop-portal-hyprland)(.*)$
}

windowrule {
  name = float-polkit-agents
  float = on
  match:class = ^(polkit-gnome-authentication-agent-1|hyprpolkitagent|org.org.kde.polkit-kde-authentication-agent-1)(.*)$
}

windowrule {
  name = float-calculator
  float = on
  match:title = ^(Calculator)$
}

# Force Steam client to tile
windowrule {
  name = tile-steam-client
  tile = on
  match:class = ^(steam)$
  match:title = ^(Steam)$
}

# Opacity settings
windowrule {
  name = opacity-file-managers
  opacity = 0.92
  match:class = ^(thunar|nemo)$
}

windowrule {
  name = opacity-chat-apps
  opacity = 0.96 0.96
  match:class = ^(discord|armcord|webcord|vesktop)$
}

windowrule {
  name = opacity-chat-titles
  opacity = 0.96 0.96
  match:title = ^(QQ|Telegram)$
}

windowrule {
  name = opacity-netease-music
  opacity = 0.95
  match:title = ^(NetEase Cloud Music Gtk4)$
}

# Picture-in-Picture positioning
windowrule {
  name = pip-position-size
  float = on
  size = 960 540
  move = (monitor_w-window_w-48) (monitor_h-window_h-48)
  match:title = ^(Picture-in-Picture)$
}

# Media and utility windows
windowrule {
  name = float-media-utilities
  float = on
  size = 960 540
  center = on
  match:title = ^(imv|mpv|danmufloat|termfloat|nemo|ncmpcpp)$
}

windowrule {
  name = pin-danmufloat
  pin = on
  match:title = ^(danmufloat)$
}

windowrule {
  name = rounding-float-terminals
  rounding = 5
  match:title = ^(danmufloat|termfloat)$
}

# Terminal animations
windowrule {
  name = animation-terminals
  animation = slide right
  match:class = ^(kitty|Alacritty|foot|com\.mitchellh\.ghostty)$
}

# Browser optimizations
windowrule {
  name = noblur-browsers
  no_blur = on
  match:class = ^(org.mozilla.firefox|zen|chromium)$
}

# Workspace-specific decorations
windowrule {
  name = deco-floating-ws-1-10
  border_size = 1
  border_color = $cachylblue
  rounding = 8
  match:float = 1
}

windowrule {
  name = deco-tiled-ws-1-10
  border_size = 1
  rounding = 4
  match:float = 0
}

# Windows Rules End #

# Smart gaps
workspace = w[t1-10],w[v1-10], gapsout:5, gapsin:3
workspace = f[1], gapsout:5, gapsin:3
# Workspaces Rules End #

# Layers Rules #
layerrule {
  name = animation-logout
  animation = slide top
  match:namespace = logout_dialog
}

layerrule {
  name = animation-waybar
  animation = slide down
  match:namespace = waybar
}

layerrule {
  name = animation-wallpaper
  animation = fade 50%
  match:namespace = wallpaper
}

# Layers Rules End #
