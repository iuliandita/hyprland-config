# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┃                    Autostart Configuration                  ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

source = ~/.config/hypr/config/defaults.conf

# Autostart wiki https://wiki.hyprland.org/0.45.0/Configuring/Keywords/#executing #

exec-once = swaybg -o \* -i /usr/share/wallpapers/cachyos-wallpapers/cachygalaxy99.jpg -m fill  # Wallpaper background
exec-once = waybar &  # Status bar & taskbar
exec-once = nwg-drawer -c 6 -is 64 -spacing 10 -closebtn none -mt 100 -mb 100 -ml 600 -mr 600 -r -fm nemo -term ghostty -wm hyprland -g Tokyonight-Dark -i oomox-Tokyonight-Moon -nofs &  # Application launcher (resident)
exec-once = nwg-dock-hyprland -d -i 32 -p bottom -hd 100 -mb 10 -a center -l overlay &  # Application dock (auto-hide)
exec-once = fcitx5 -d &  # Input method (Asian languages)
exec-once = mako &  # Notification daemon
exec-once = nm-applet --indicator &  # Network manager
exec-once = blueman-applet &  # Bluetooth manager
exec-once = udiskie --no-automount --smart-tray --appindicator --menu-checkbox-workaround &  # USB automounter
exec-once = bash -c "mkfifo /tmp/$HYPRLAND_INSTANCE_SIGNATURE.wob && tail -f /tmp/$HYPRLAND_INSTANCE_SIGNATURE.wob | wob & disown" &  # Volume/brightness OSD
exec-once = /usr/lib/polkit-kde-authentication-agent-1 &  # Authentication agent
exec-once = kdeconnectd &  # KDE Connect daemon
exec-once = kdeconnect-indicator &  # KDE Connect indicator
exec-once = ~/.config/hypr/scripts/monitor-listener &  # Dock/undock -> location-switch

# ## Slow app launch fix
exec-once = systemctl --user import-environment &  # Systemd environment setup
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP HYPRLAND_INSTANCE_SIGNATURE  # D-Bus systemd sync

# ## Secrets / keyring
exec-once = gnome-keyring-daemon --start --components=secrets &  # Secret service for OAuth tokens

# ## Idle configuration
exec-once = $idlehandler  # Screen lock & suspend on idle

